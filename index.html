<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PZM Computers & Mobile Phones</title>
    <link rel="icon" href="images/favico.svg" type="image/svg+xml">
    <link rel="stylesheet" type="text/css" href="style.css">
    <!-- Slick CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.css"/>
    <link rel="stylesheet" type="text/css" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick-theme.min.css"/>
</head>
<body>
    <header>
        <img src="images/logo.svg" alt="PZM Logo" class="logo">
        <h1>PZM Computers & Mobile Phones</h1>
    </header>
    <main>
        <h2>Services</h2>
        <p>Sell, Buy, Trade-in, Repair, Recycle, Brand New & Secondhand, Gaming PCs</p>
        <div class="services-slider">
            <div><img src="images/Services/repairing_services.jpg" alt="Repairing Services"></div>
            <div><img src="images/Services/Sell_Your_Old_iPhones.jpg" alt="Sell Your Old iPhones"></div>
            <div><img src="images/Services/reignite_your_macbook.jpg" alt="Reignite Your MacBook"></div>
            <div><img src="images/Services/sell_old_mackbook.jpg" alt="Sell Old MacBook"></div>
            <div><img src="images/Services/macbook.jpg" alt="MacBook"></div>
            <div><img src="images/Services/sell_old_iphones.jpg" alt="Sell Old iPhones"></div>
        </div>
        <!-- Your existing content goes here -->
    </main>
    <footer>
        <p>&copy; 2024 PZM Computers & Mobile Phones. All rights reserved.</p>
    </footer>
    <div class="fixed-contact">
        <a href="tel:+971528026677"><img src="images/Call_Us.jpg" alt="Call Us"></a>
        <a href="https://wa.me/971528026677"><img src="images/Chat_With_Us.jpg" alt="Chat With Us"></a>
    </div>
    <!-- Slick JS -->
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.js"></script>
    <script type="text/javascript">
        $(document).ready(function(){
            $('.services-slider').slick({
                dots: true,
                infinite: true,
                speed: 300,
                slidesToShow: 1,
                adaptiveHeight: true,
                autoplay: true,
                autoplaySpeed: 2000,
            });
        });
    </script>
</body>
</html>
